name: Actualizar CSV del dashboard

on:
  workflow_dispatch:
  schedule:
    - cron: "0 */2 * * *"

permissions:
  contents: write

jobs:
  update-csv:
    runs-on: ubuntu-latest

    steps:
      - name: Descargar repositorio
        uses: actions/checkout@v4

      - name: Descargar CSV desde OneDrive o SharePoint
        run: |
          mkdir -p data
          curl -L "${{ secrets.CSV_URL }}" -o data/projects.csv

      - name: Verificar que el CSV tenga contenido
        run: |
          if [ ! -s data/projects.csv ]; then
            echo "El archivo CSV está vacío o no se pudo descargar."
            exit 1
          fi

          head -n 1 data/projects.csv

      - name: Guardar cambios si el CSV cambió
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/projects.csv
          git diff --staged --quiet || git commit -m "Actualizar projects.csv automáticamente"
          git push
