name: Actualizar CSV del dashboard desde Excel

on:
  workflow_dispatch:
  schedule:
    - cron: "0 */2 * * *"

permissions:
  contents: write

jobs:
  update-csv-from-excel:
    runs-on: ubuntu-latest

    steps:
      - name: Descargar repositorio
        uses: actions/checkout@v4

      - name: Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Instalar dependencias
        run: |
          python -m pip install --upgrade pip
          pip install openpyxl
          
      - name: Descargar Excel desde OneDrive o SharePoint
        run: |
          mkdir -p data
          curl -L --fail --retry 3 \
            -A "Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 Chrome/120 Safari/537.36" \
            -H "Accept: application/vnd.openxmlformats-officedocument.spreadsheetml.sheet,application/octet-stream,*/*" \
            -H "Accept-Language: es-ES,es;q=0.9,en;q=0.8" \
            "${{ secrets.EXCEL_URL }}" \
            -o data/source.xlsx

      - name: Verificar que el archivo sea un Excel válido
        run: |
          python <<'PY'
          import zipfile
          from pathlib import Path

          path = Path("data/source.xlsx")

          if not path.exists() or path.stat().st_size == 0:
              raise SystemExit("No se descargó el archivo Excel o está vacío.")

          if not zipfile.is_zipfile(path):
              print("El archivo descargado no parece ser un .xlsx válido.")
              print("Primeros 500 caracteres descargados:")
              print(path.read_bytes()[:500])
              raise SystemExit("Probablemente el enlace pide inicio de sesión o descargó una página HTML.")

          print("Excel descargado correctamente.")
          PY

      - name: Convertir Excel a CSV UTF-8
        run: |
          python <<'PY'
          import csv
          import unicodedata
          from pathlib import Path
          from openpyxl import load_workbook

          source = Path("data/source.xlsx")
          output = Path("data/projects.csv")

          wb = load_workbook(source, data_only=True)

          # Usa la primera hoja visible del Excel
          ws = None
          for sheet in wb.worksheets:
              if sheet.sheet_state == "visible":
                  ws = sheet
                  break

          if ws is None:
              raise SystemExit("No se encontró una hoja visible en el Excel.")

          def clean(value):
              if value is None:
                  return ""
              value = str(value).replace("\r", " ").replace("\n", " ").strip()
              return value

          def normalize(text):
              text = clean(text).upper()
              text = unicodedata.normalize("NFKD", text)
              text = "".join(c for c in text if not unicodedata.combining(c))
              return text

          rows = []
          for row in ws.iter_rows(values_only=True):
              rows.append([clean(cell) for cell in row])

          # Buscar la fila de encabezados real
          header_index = None
          for i, row in enumerate(rows):
              normalized = [normalize(cell) for cell in row]
              joined = " | ".join(normalized)

              if "DIRECCION" in joined and "REFERENCIA GENERAL" in joined:
                  header_index = i
                  break

          if header_index is None:
              raise SystemExit("No se encontró la fila de encabezados con DIRECCION y REFERENCIA GENERAL.")

          data_rows = rows[header_index:]

          # Eliminar filas totalmente vacías
          data_rows = [
              row for row in data_rows
              if any(clean(cell) for cell in row)
          ]

          output.parent.mkdir(parents=True, exist_ok=True)

          with output.open("w", newline="", encoding="utf-8-sig") as f:
              writer = csv.writer(f)
              writer.writerows(data_rows)

          print(f"CSV generado correctamente: {output}")
          print(f"Filas exportadas: {len(data_rows)}")
          PY

      - name: Verificar encabezado del CSV
        run: |
          head -n 3 data/projects.csv

      - name: Guardar cambios en GitHub
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/projects.csv
          git diff --staged --quiet || git commit -m "Actualizar projects.csv desde Excel"
          git push
